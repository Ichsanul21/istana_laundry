function calcPrice(service, weightKg) {
  if (!weightKg || weightKg <= 0) return 0;
  const tier = S.pricingTiers.find(t => t.service === service && weightKg >= t.minWeight && weightKg <= t.maxWeight);
  return tier ? Math.round(tier.pricePerKg * weightKg) : 0;
}

function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8); return v.toString(16); });
}

function validatePhone(p) {
  return /^62[0-9]{8,15}$/.test(p);
}

function formatPhone(val) {
  let d = val.replace(/[^0-9]/g, '');
  if (d.startsWith('0')) d = '62' + d.slice(1);
  if (d.startsWith('8')) d = '62' + d;
  if (!d.startsWith('62')) d = '62' + d;
  return d;
}

function applyRounding(amount, mode) {
  if (mode === 'none') return amount;
  if (mode === 'down_100') return Math.floor(amount / 100) * 100;
  if (mode === 'up_100') return Math.ceil(amount / 100) * 100;
  if (mode === 'nearest_500') return Math.round(amount / 500) * 500;
  return amount;
}

function calcPpn(amount, mode, rate) {
  const r = rate || S.ppnRate;
  if (mode === 'nonaktif') return { ppnAmount: 0, totalBeforePpn: amount, totalAfterPpn: amount, ppnRate: 0 };
  if (mode === 'include') {
    const ppn = Math.round(amount - (amount * 100 / (100 + r)));
    return { ppnAmount: ppn, totalBeforePpn: amount - ppn, totalAfterPpn: amount, ppnRate: r };
  }
  if (mode === 'exclude') {
    const ppn = Math.round(amount * r / 100);
    return { ppnAmount: ppn, totalBeforePpn: amount, totalAfterPpn: amount + ppn, ppnRate: r };
  }
  return { ppnAmount: 0, totalBeforePpn: amount, totalAfterPpn: amount, ppnRate: 0 };
}

function calcTotalBreakdown(basePrice, discPercent, roundingMode, ppnMode, ppnRate) {
  const afterDisc = basePrice - Math.round(basePrice * (discPercent||0) / 100);
  const ppn = calcPpn(afterDisc, ppnMode||S.ppnMode, ppnRate||S.ppnRate);
  const rounded = applyRounding(ppn.totalAfterPpn, roundingMode||S.roundingMode);
  return { basePrice, afterDisc, ppnAmount: ppn.ppnAmount, ppnRate: ppn.ppnRate, totalBeforeRounding: ppn.totalAfterPpn, roundingDiff: rounded - ppn.totalAfterPpn, total: rounded };
}

  return 'in_progress';
}

}

function printEscPos(order) {
  const lines = [];
  const center = t => '\x1b\x61\x01' + t;
  const bold = t => '\x1b\x45\x01' + t + '\x1b\x45\x00';
  const normal = t => '\x1b\x61\x00' + t;
  const large = t => '\x1b\x21\x30' + t + '\x1b\x21\x00';

  lines.push('\x1b\x40'); // Init
  lines.push(center('ISTANA Laundry'));
  lines.push(center('LaundryOS v1.0'));
  lines.push(center('=============================='));
  lines.push(normal(''));
  lines.push(center(bold('STRUK PENERIMAAN')));
  lines.push(normal(''));
  lines.push(normal('Kode: ' + order.code));
  lines.push(normal('Pelanggan: ' + order.customer));
  lines.push(normal('Tgl: ' + order.receivedAt));
  lines.push(normal('Layanan: ' + ({regular:'Reguler',express:'Express',dry_clean:'Dry Clean'}[order.service]||order.service)));
  if (order.weight) lines.push(normal('Berat: ' + order.weight + ' kg'));
  lines.push(normal('Total: Rp ' + Number(order.total).toLocaleString('id-ID')));
  lines.push(normal('Bayar: ' + ({cash:'Tunai',qris:'QRIS',wallet:'Saldo'}[order.payMethod]||order.payMethod)));
  lines.push(normal(''));
  const trackingUrl = 'https://track.laundryos.com/' + order.code;
  const waUrl = 'https://wa.me/' + order.phone + '?text=Halo%2C%20pesanan%20' + order.code;
  lines.push(center('QR Code Tracking & WA'));
  lines.push('\x1d\x6b\x04' + String.fromCharCode(trackingUrl.length+3) + '\x00' + trackingUrl); // QR Code command
  lines.push(normal(''));
  lines.push(center('Scan untuk cek progress'));
  lines.push(center(waUrl));
  lines.push(normal(''));
  lines.push(center('Terima kasih!'));
  lines.push('\x1d\x56\x00'); // Cut paper

  const escText = lines.join('\n');
  try {
    // Coba kirim ke printer thermal via POST ke local server (port 8001 untuk ESC/POS)
    fetch('http://127.0.0.1:8001/print', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data:btoa(escText)}), mode:'no-cors' }).catch(()=>{});
  } catch(e) {}
  toast('Label & struk dikirim ke printer thermal', 'success');
}

function syncOfflineQueue() {
  if (S.offlineQueue.length === 0) return;
  const pending = [...S.offlineQueue];
  const success = [];
  for (const scan of pending) {
    const o = S.orders.find(x => x.code === scan.code);
    if (o) {
      o.status = scan.targetStatus;
      success.push(scan);
    }
  }
  S.offlineQueue = S.offlineQueue.filter(s => !success.includes(s));
  if (success.length > 0) toast(success.length + ' scan offline berhasil disinkronkan', 'success');
}

function bindLogin() {
  let pin = '';
  document.querySelectorAll('.pin-key').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.pin;
      if (v === 'del') { pin = pin.slice(0,-1); }
      else if (pin.length < 4) { pin += v; }
      document.querySelectorAll('.pin-dot').forEach((d,i) => d.classList.toggle('filled', i < pin.length));
      if (pin.length === 4) {
        if (pin === '1234') {
          S.loggedIn = true;
          S.role = document.querySelector('.role-btn.border-brand-500')?.dataset.role || 'cashier';
          S.page = S.role === 'workshop' ? 'scanner' : 'dashboard';
          toast('Selamat datang di LaundryOS!','success');
          render();
        } else {
          toast('PIN salah! Coba lagi.','error');
          pin = '';
          document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('filled'));
        }
      }
    });
  });
  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.role-btn').forEach(b => { b.className = 'role-btn px-3 py-2 rounded-lg text-xs font-semibold border transition-all border-surface-700 text-surface-400 hover:border-surface-500'; });
      btn.className = 'role-btn px-3 py-2 rounded-lg text-xs font-semibold border transition-all border-brand-500 bg-brand-500/10 text-brand-400';
    });
  });
}

}

function searchCustomer(q) {
  const dd = $('cust-dropdown');
  if (!q || q.length < 2) { dd.classList.add('hidden'); return; }
  const results = S.customers.filter(c => c.name.toLowerCase().includes(q.toLowerCase()) || c.phone.includes(q));
  if (results.length === 0) {
    const phone = formatPhone(q);
    const valid = validatePhone(phone);
    dd.innerHTML = valid
      ? `<button class="w-full px-4 py-2.5 text-left hover:bg-surface-50 flex items-center justify-between transition-colors" onclick="createCustomer('${phone}')">
          <div><p class="text-sm font-medium text-surface-800">Pelanggan Baru</p><p class="text-xs text-surface-400">${phone} <span class="text-green-600 font-medium">(valid)</span></p></div>
          <span class="text-xs text-brand-600"><i class="fas fa-plus mr-1"></i>Buat</span>
        </button>`
      : '<div class="px-4 py-3 text-sm text-surface-400">Pelanggan tidak ditemukan. Ketik nomor HP valid (62xxx)</div>';
    dd.classList.remove('hidden');
    return;
  }
  dd.innerHTML = results.map(c => `
    <button class="w-full px-4 py-2.5 text-left hover:bg-surface-50 flex items-center justify-between transition-colors" onclick="selectCustomer(${c.id})">
      <div><p class="text-sm font-medium text-surface-800">${c.name}</p><p class="text-xs text-surface-400">${c.phone}</p></div>
      ${tierBadge(c.tier)}
    </button>
  `).join('');
  dd.classList.remove('hidden');
  // Klik di luar dropdown untuk menutup
  setTimeout(()=>{
    document.addEventListener('click',function handler(e){
      if(!dd.contains(e.target)&&e.target.id!=='cust-search'){ dd.classList.add('hidden'); document.removeEventListener('click',handler); }
    });
  },10);
}

function createCustomer(phone) {
  const newId = Math.max(...S.customers.map(c=>c.id),0) + 1;
  const cust = { id:newId, name:'Pelanggan Baru', phone, tier:'REGULAR', wallet:0, totalSpent:0, lastOrder:'2024-05-01' };
  S.customers.push(cust);
  S.newOrder.customer = cust;
  $('cust-dropdown').classList.add('hidden');
  toast('Pelanggan baru dibuat: '+phone, 'success');
  render();
}

function selectCustomer(id) {
  S.newOrder.customer = S.customers.find(c=>c.id===id);
  $('cust-dropdown').classList.add('hidden');
  render();
}

function submitOrder() {
  const o = S.newOrder;
  if (!o.customer) return;
  const price = o.mode==='kiloan' ? calcPrice(o.service, parseFloat(o.weight)||0) : o.items.reduce((a,it)=>a+(S.itemPricing.find(p=>p.type===it.type)?.price||0),0);
  const disc = S.membershipTiers.find(t=>t.code===o.customer.tier)?.discount||0;
  const breakdown = calcTotalBreakdown(price, disc, S.roundingMode, S.ppnMode, S.ppnRate);

  if (S.addOnTarget) {
    const target = S.orders.find(x => x.code === S.addOnTarget.code);
    if (target) {
      if (o.mode === 'kiloan' && parseFloat(o.weight)) {
        target.weight = (target.weight||0) + parseFloat(o.weight);
        target.items.push({type:'Kiloan',color:'',notes:o.notes,status:'received'});
      } else {
        o.items.filter(i=>i.type).forEach(it => target.items.push({...it,status:'received'}));
      }
      target.total += breakdown.total;
      if (target.total < 0) target.total = 0;
      toast(`Add-On berhasil! ${target.code} diperbarui.`, 'success');
    }
    S.addOnTarget = null;
    S.newOrder = { mode:'kiloan', customer:null, service:'regular', weight:'', items:[], notes:'', payMethod:'cash' };
    nav('orders');
    return;
  }

  const newId = Math.max(...S.orders.map(x=>x.id)) + 1;
  const code = 'LND-240501-' + String(newId).padStart(3,'0');
  const items = o.mode==='kiloan'
    ? [{type:'Kiloan',color:'',notes:o.notes,status:'received'}]
    : o.items.filter(i=>i.type).map(it => ({...it,status:'received'}));
  const order = {
    id: newId, code, customer: o.customer.name, phone: o.customer.phone,
    status: 'received', service: o.service, weight: o.mode==='kiloan'?parseFloat(o.weight)||0:0,
    total: breakdown.total, payMethod: o.payMethod, payStatus: 'paid',
    ppnAmount: breakdown.ppnAmount, ppnRate: breakdown.ppnRate,
    roundingDiff: breakdown.roundingDiff,
    items, receivedAt: '2024-05-01 ' + new Date().toTimeString().slice(0,5), completedAt: null
  };
  S.orders.push(order);
  printEscPos(order);
  toast(`Order ${code} berhasil dibuat! Label dicetak.`, 'success');
  S.newOrder = { mode:'kiloan', customer:null, service:'regular', weight:'', items:[], notes:'', payMethod:'cash' };
  nav('dashboard');
}

        <button onclick="reportIssue('${r.code}')" class="w-full py-3 mt-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-xl text-sm font-semibold transition-colors border border-red-500/20">
          <i class="fas fa-flag mr-2"></i>Laporkan Masalah
        </button>
      </div>
    `:`

        <p class="text-surface-500 text-sm">Mode: USB Scanner / Kamera</p>
        <p class="text-surface-600 text-xs mt-1">UUID idempotency aktif — debounce 300ms</p>
        <div class="mt-3 flex gap-2 justify-center">
          ${S.orders.filter(o=>o.status!=='completed'&&o.status!=='cancelled').slice(0,5).map(o=>`

          `).join('')}
        </div>
        <p class="text-surface-600 text-xs mt-2">Quick pick untuk demo</p>
      </div>
    `}
  </div>`;
}

function handleScan(code) {
  code = code.trim().replace(/[^A-Za-z0-9\-]/g,'');
  if (!code) return;

  // Debounce 300ms: cegah scan ganda dalam 300ms
  const now = Date.now();
  const lastScan = S.scanIdempotency[code] || 0;
  if (now - lastScan < 300) { return; }
  S.scanIdempotency[code] = now;

  // Cooldown: cegah scan baru jika masih dalam cooldown 1 detik
  if (S.scanCooldown) { toast('Tunggu sebentar...','warning'); return; }

  const o = S.orders.find(x => x.code === code);
  if (!o) { toast('Order tidak ditemukan: '+code,'error'); return; }
  if (o.status === 'completed' || o.status === 'cancelled') { toast('Order sudah selesai/dibatalkan','warning'); return; }

  // Set scan result dengan item-level status
  const hdrStatus = orderHeaderStatus(o);
  S.scanResult = {
    ...o,
    status: hdrStatus,
    instructions: o.items.map(i=>i.notes).filter(Boolean).join('. ') || null
  };

  // Cooldown 1 detik: disable UI
  S.scanCooldown = true;
  render();
  setTimeout(() => {
    document.getElementById('scanner-input')?.focus();
  }, 50);

  setTimeout(() => {
    S.scanCooldown = false;
    if (!S.scanResult) render();
  }, 1000);
}

function advanceOrder(code) {
  const o = S.orders.find(x=>x.code===code);
  if (!o) return;
  const ns = nextStatus(o.status);
  if (!ns) return;

  // Cek koneksi offline: jika offline, simpan ke queue
  if (!navigator.onLine) {
    S.offlineQueue.push({ code, targetStatus: ns, timestamp: new Date().toISOString() });
    toast('Offline: scan disimpan, akan sync otomatis','info');
    S.scanResult = null;
    render();
    setTimeout(()=>document.getElementById('scanner-input')?.focus(), 100);
    return;
  }

  // Cek stok jika mulai cuci
  if (ns === 'washing') {
    const det = S.materials.find(m=>m.name==='Deterjen Cair');
    if (det && det.stock < (o.weight * 0.02)) {
      toast('Gagal: Stok deterjen tidak cukup!','error');
      return;
    }
    if (det) det.stock = Math.max(0, det.stock - o.weight * 0.02);
  }

  // Update item-level status untuk split order
  const isSplit = o.items.length > 1;
  if (isSplit) {
    o.items.forEach(item => {
      if (item.status === o.status || !item.status) {
        item.status = ns;
      }
    });
  }
  o.status = ns;
  toast(`${code} -> ${statusLabel(ns)}`,'success');
  S.scanResult = null;
  render();
  setTimeout(()=>document.getElementById('scanner-input')?.focus(), 100);
}

function reportIssue(code) {
  showModal('Laporkan Masalah', `
    <div class="space-y-3">

function submitIssue(code) {
  const o = S.orders.find(x=>x.code===code);
  if (o) o.has_issue = true;
  S.complaints.push({ id: S.complaints.length+1, orderCode:code, customer:o?.customer||'', category:$('issue-cat')?.value||'other', status:'reported', desc:$('issue-desc')?.value||'', date:'2024-05-01' });

  S.scanResult = null; render();
}

    <!-- Variance Report Tab -->

      <table class="w-full text-sm">
        <thead class="bg-surface-50"><tr>
          <th class="text-left px-4 py-2 font-semibold text-surface-600">Bahan Baku</th>
          <th class="text-right px-4 py-2 font-semibold text-surface-600">Formula (seharusnya)</th>
          <th class="text-right px-4 py-2 font-semibold text-surface-600">Pemakaian Riil</th>
          <th class="text-right px-4 py-2 font-semibold text-surface-600">Selisih</th>
          <th class="text-center px-4 py-2 font-semibold text-surface-600">Status</th>

            {material:'Pewangi Rose', formulaPerKg:0.010, unit:'L', riil:0.6},
            {material:'Plastik Packing', formulaPerKg:0.5, unit:'pcs', riil:28},
          ].map(v=>{
            const todayKg = S.orders.filter(o=>o.receivedAt?.startsWith('2024-05-01')&&!['received','cancelled'].includes(o.status)).reduce((a,o)=>a+(o.weight||0),0);
            const seharusnya = todayKg * v.formulaPerKg;
            const selisih = v.riil - seharusnya;
            const pct = seharusnya > 0 ? Math.abs(selisih)/seharusnya*100 : 0;
            return `<tr class="hover:bg-surface-50">
              <td class="px-4 py-2.5 font-medium">${v.material}</td>
              <td class="px-4 py-2.5 text-right text-surface-600">${seharusnya.toFixed(2)} ${v.unit}</td>
              <td class="px-4 py-2.5 text-right font-medium text-surface-800">${v.riil.toFixed(1)} ${v.unit}</td>
              <td class="px-4 py-2.5 text-right ${selisih>0?'text-red-600':'text-green-600'} font-medium">${selisih>0?'+':''}${selisih.toFixed(2)} ${v.unit}</td>
              <td class="px-4 py-2.5 text-center">${pct<10?'<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">Normal</span>':'<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">Over '+pct.toFixed(0)+'%</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

}

function resolveComplaint(id) {
  showModal('Selesaikan Komplain', `
    <div class="space-y-3">
      <div><label class="text-sm text-surface-600 block mb-1">Tipe Kompensasi</label>
        <select id="comp-type" class="w-full border border-surface-300 rounded-lg px-3 py-2 text-sm">
          <option value="wallet_cashback">Cashback Saldo</option><option value="free_wash_voucher">Voucher Gratis Cuci</option><option value="discount_voucher">Voucher Diskon</option>
        </select>
      </div>
      <div><label class="text-sm text-surface-600 block mb-1">Nilai (Rp)</label><input type="number" id="comp-value" value="50000" class="w-full border border-surface-300 rounded-lg px-3 py-2 text-sm"></div>
    </div>
  `, `<button onclick="closeModal()" class="px-4 py-2 bg-surface-100 rounded-lg text-sm font-medium">Batal</button>
      <button onclick="doResolveComplaint(${id})" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg text-sm font-semibold">Berikan Kompensasi</button>`);
}

function doResolveComplaint(id) {
  const c = S.complaints.find(x=>x.id===id);
  if (c) { c.status='resolved'; c.compensation = { type:$('comp-type')?.value||'wallet_cashback', value:parseInt($('comp-value')?.value)||50000 }; }
  closeModal(); toast('Kompensasi berhasil diberikan!','success'); render();
}

function netProfitCalc() {
  const todayOrders = S.orders.filter(o=>o.receivedAt?.startsWith('2024-05-01'));
  const revenue = todayOrders.reduce((a,o)=>a+o.total,0);
  const hpp = todayOrders.filter(o=>!['received','cancelled'].includes(o.status)).reduce((a,o)=>a+(o.weight*0.02*25000+o.weight*0.005*35000),0);
  return Math.max(0, revenue - hpp - 150000);
}

function bindPage() {
  // Inisialisasi chart setelah DOM tersedia
  requestAnimationFrame(() => { initCharts(); });

  if (S.role === 'workshop' && S.page === 'scanner') {
    setTimeout(() => {
      const si = document.getElementById('scanner-input');
      if (si) si.focus();
    }, 200);
  }

  // Keyboard shortcut: Escape untuk tutup modal
  document.onkeydown = (e) => {
    if (e.key === 'Escape') closeModal();
  };
}

// ============================================================
// SIMULASI REAL-TIME (Demo WebSocket Effect)
// ============================================================
let rtInterval = null;
function startRealtimeSim() {
  if (rtInterval) clearInterval(rtInterval);
  rtInterval = setInterval(() => {
    if (!S.loggedIn) { clearInterval(rtInterval); return; }
    // Simulasi: sesekali update status order secara acak
    if (Math.random() < 0.15) {
      const movable = S.orders.filter(o => !['completed','cancelled','ready'].includes(o.status));
      if (movable.length > 0) {
        const target = movable[Math.floor(Math.random() * movable.length)];
        const ns = nextStatus(target.status);
        if (ns) {
          target.status = ns;
          // Cek stok deterjen saat mulai cuci
          if (ns === 'washing') {
            const det = S.materials.find(m => m.name === 'Deterjen Cair');
            if (det && det.stock >= target.weight * 0.02) {
              det.stock = Math.max(0, det.stock - target.weight * 0.02);
            }
          }
          // Hanya re-render halaman yang relevan
          if (S.page === 'live' || S.page === 'dashboard') {
            render();
          }
        }
      }
    }
  }, 8000); // Setiap 8 detik, 15% chance
}

  return `
  <div class="min-h-screen bg-surface-100">
    <div class="bg-white border-b border-surface-200 px-4 py-4">
      <div class="max-w-lg mx-auto flex items-center gap-3">
        <img src="https://z-cdn-media.chatglm.cn/files/4ecb000b-de22-46b7-849a-564194b5b2f3.png?auth_key=1879018142-a3731bcb3c26482fbd66abab61ce6610-0-16fb9a0d7b205d69b8eb6151d9920a37" class="w-8 h-8 rounded-full" onerror="this.outerHTML='<div class=\\'w-8 h-8 rounded-full bg-brand-600 flex items-center justify-center text-white text-xs font-bold\\'>IL</div>'">

        <span class="inline-block mt-3 px-4 py-1.5 rounded-full text-sm font-bold ${statusColor(o.status)}">${statusLabel(o.status)}</span>
      </div>
      <div class="bg-white rounded-2xl border border-surface-200 p-6">
        <div class="relative">
          ${steps.map((s, i) => {
            const done = i <= currentIdx;
            const isCurrent = s === o.status;
            return `
              <div class="flex gap-4 ${i < steps.length-1 ? 'pb-8' : ''}">
                <div class="flex flex-col items-center">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${done?(isCurrent?'bg-brand-500 text-white ring-4 ring-brand-500/20 pulse-dot':'bg-green-500 text-white'):'bg-surface-200 text-surface-400'}">
                    ${done?'<i class="fas fa-check"></i>':i+1}
                  </div>
                  ${i < steps.length-1 ? `<div class="w-0.5 flex-1 mt-1 ${done?'bg-green-500':'bg-surface-200'}"></div>` : ''}
                </div>
                <div class="pt-2">
                  <p class="font-semibold text-sm ${done?'text-surface-800':'text-surface-400'}">${statusLabel(s)}</p>
                  ${isCurrent && o.status==='ready'?'<p class="text-xs text-green-600 mt-0.5"><i class="fas fa-bell mr-1"></i>Silakan diambil di outlet</p>':''}
                  ${isCurrent && o.status!=='ready'&&o.status!=='completed'?'<p class="text-xs text-brand-600 mt-0.5"><i class="fas fa-spinner fa-spin mr-1"></i>Sedang diproses...</p>':''}
                  ${done && !isCurrent?'<p class="text-xs text-surface-400 mt-0.5">Selesai</p>':''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
      <div class="bg-white rounded-2xl border border-surface-200 p-6">
        <h4 class="font-semibold text-surface-800 mb-3">Detail Pesanan</h4>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-surface-500">Pelanggan</span><span class="font-medium">${o.customer}</span></div>
          <div class="flex justify-between"><span class="text-surface-500">Layanan</span><span class="font-medium">${{regular:'Reguler',express:'Express',dry_clean:'Dry Clean'}[o.service]}</span></div>
          ${o.weight?`<div class="flex justify-between"><span class="text-surface-500">Berat</span><span class="font-medium">${o.weight} kg</span></div>`:''}
          <div class="flex justify-between"><span class="text-surface-500">Diterima</span><span class="font-medium">${o.receivedAt}</span></div>
        </div>
      </div>
      <div class="text-center">

// ============================================================
// HASH ROUTER untuk Public Tracking
// ============================================================
function checkHashRoute() {
  const hash = window.location.hash;
  if (hash.startsWith('#track/')) {
    const code = hash.replace('#track/', '');
    S.loggedIn = false;
    $('app').innerHTML = renderPublicTracking(code);
    return true;
  }
  return false;
}

window.addEventListener('hashchange', () => { checkHashRoute(); });

// ============================================================
// INIT
// ============================================================
(function init() {
  if (!checkHashRoute()) {
    render();
    startRealtimeSim();
  }
  // Online/Offline event untuk auto-sync scan buffer
  window.addEventListener('online', () => {
    if (S.offlineQueue.length > 0) {
      syncOfflineQueue();
      if (S.page === 'scanner') render();
    }
  });
  window.addEventListener('offline', () => {
    toast('Koneksi internet terputus. Scan akan disimpan lokal.','warning');
  });
  // Cek navigator.onLine di awal
  if (!navigator.onLine && S.offlineQueue.length > 0) {
    toast(S.offlineQueue.length + ' scan offline menunggu sinkronisasi','info');
  }
})();
</script>
